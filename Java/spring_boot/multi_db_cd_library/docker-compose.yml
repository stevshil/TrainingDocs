services:
  mysql:
    image: mysql:8.3
    container_name: mysql_cd
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secret123
      MYSQL_DATABASE: cddb
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password
    # volumes:
    #   - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
